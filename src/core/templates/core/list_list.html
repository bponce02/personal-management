{% extends "base.html" %}

{% block title %}Lists{% endblock %}

{% block content %}
    <h1 class="text-2xl font-bold mb-4">Lists</h1>

    <ul class="mb-6 space-y-1">
        {% for list in lists %}
            <li class="border-b py-2">{{ list.title }} <span class="text-sm opacity-60">({{ list.view }})</span></li>
        {% empty %}
            <li class="opacity-60 py-2">No lists yet. Create one below.</li>
        {% endfor %}
    </ul>

    <h2 class="font-bold mb-2">New list</h2>
    <form method="post" class="space-y-2" autocomplete="off">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="border px-3 py-1">Create list</button>
    </form>
{% endblock %}
